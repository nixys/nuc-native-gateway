suite: listenerset template
templates:
  - templates/listenerset.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no ListenerSet documents by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ListenerSet fields from the fixture
    values:
      - tests/values/listenerset.values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ListenerSet
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: shared-listeners
      - equal:
          path: metadata.namespace
          value: apps
      - equal:
          path: metadata.labels.platform
          value: gateway-api
      - equal:
          path: metadata.labels.component
          value: listener-set
      - equal:
          path: metadata.annotations.note
          value: shared
      - equal:
          path: spec.parentRef
          value:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: edge-gateway
            namespace: edge-ns
      - equal:
          path: spec.listeners[0].name
          value: shared-https
      - equal:
          path: spec.listeners[0].hostname
          value: shared.example.com
      - equal:
          path: spec.listeners[0].port
          value: 8443
      - equal:
          path: spec.listeners[0].protocol
          value: HTTPS
      - equal:
          path: spec.listeners[0].tls
          value:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: shared-cert
            options:
              example.com/min-version: "1.3"
      - equal:
          path: spec.listeners[0].allowedRoutes
          value:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  tenant: shared
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - prod
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
      - equal:
          path: status.conditions[0]
          value:
            type: Accepted
            status: "True"
            observedGeneration: 1
            lastTransitionTime: "2026-03-13T10:25:00Z"
            reason: Accepted
            message: ListenerSet accepted
      - equal:
          path: status.conditions[1]
          value:
            type: Programmed
            status: "True"
            observedGeneration: 1
            lastTransitionTime: "2026-03-13T10:25:00Z"
            reason: Programmed
            message: ListenerSet programmed
      - equal:
          path: status.listeners[0].supportedKinds[0]
          value:
            group: gateway.networking.k8s.io
            kind: HTTPRoute
      - equal:
          path: status.listeners[0].attachedRoutes
          value: 2
      - equal:
          path: status.listeners[0].conditions[0]
          value:
            type: Accepted
            status: "True"
            observedGeneration: 1
            lastTransitionTime: "2026-03-13T10:25:00Z"
            reason: Accepted
            message: Listener accepted
      - equal:
          path: status.listeners[0].conditions[1]
          value:
            type: Programmed
            status: "True"
            observedGeneration: 1
            lastTransitionTime: "2026-03-13T10:25:00Z"
            reason: Programmed
            message: Listener programmed
