suite: example resources
templates:
  - templates/clusterservingruntime.yaml
  - templates/clusterstoragecontainer.yaml
  - templates/inferencegraph.yaml
  - templates/inferenceservice.yaml
  - templates/localmodelcache.yaml
  - templates/localmodelnodegroup.yaml
  - templates/localmodelnode.yaml
  - templates/servingruntime.yaml
  - templates/trainedmodel.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders the expected document count per template
    values:
      - ../../values.yaml.example
    asserts:
      - hasDocuments:
          count: 1
        template: templates/clusterservingruntime.yaml
      - hasDocuments:
          count: 1
        template: templates/clusterstoragecontainer.yaml
      - hasDocuments:
          count: 1
        template: templates/inferencegraph.yaml
      - hasDocuments:
          count: 1
        template: templates/inferenceservice.yaml
      - hasDocuments:
          count: 1
        template: templates/localmodelcache.yaml
      - hasDocuments:
          count: 1
        template: templates/localmodelnodegroup.yaml
      - hasDocuments:
          count: 1
        template: templates/localmodelnode.yaml
      - hasDocuments:
          count: 1
        template: templates/servingruntime.yaml
      - hasDocuments:
          count: 1
        template: templates/trainedmodel.yaml

  - it: renders the expected example manifests
    values:
      - ../../values.yaml.example
    asserts:
      - containsDocument:
          kind: ClusterServingRuntime
          apiVersion: serving.kserve.io/v1alpha1
          name: sklearn-cluster-runtime
          any: true
        template: templates/clusterservingruntime.yaml
      - containsDocument:
          kind: ClusterStorageContainer
          apiVersion: serving.kserve.io/v1alpha1
          name: default-storage
          any: true
        template: templates/clusterstoragecontainer.yaml
      - containsDocument:
          kind: InferenceGraph
          apiVersion: serving.kserve.io/v1alpha1
          name: model-chain
          namespace: ml-platform
          any: true
        template: templates/inferencegraph.yaml
      - containsDocument:
          kind: InferenceService
          apiVersion: serving.kserve.io/v1beta1
          name: sklearn-iris
          namespace: ml-platform
          any: true
        template: templates/inferenceservice.yaml
      - containsDocument:
          kind: LocalModelCache
          apiVersion: serving.kserve.io/v1alpha1
          name: bert-cache
          any: true
        template: templates/localmodelcache.yaml
      - containsDocument:
          kind: LocalModelNodeGroup
          apiVersion: serving.kserve.io/v1alpha1
          name: ssd-cache-group
          any: true
        template: templates/localmodelnodegroup.yaml
      - containsDocument:
          kind: LocalModelNode
          apiVersion: serving.kserve.io/v1alpha1
          name: worker-cache-01
          any: true
        template: templates/localmodelnode.yaml
      - containsDocument:
          kind: ServingRuntime
          apiVersion: serving.kserve.io/v1alpha1
          name: sklearn-runtime
          namespace: ml-platform
          any: true
        template: templates/servingruntime.yaml
      - containsDocument:
          kind: TrainedModel
          apiVersion: serving.kserve.io/v1alpha1
          name: sklearn-iris-v1
          namespace: ml-platform
          any: true
        template: templates/trainedmodel.yaml
