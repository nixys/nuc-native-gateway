suite: gateway template
templates:
  - templates/gateway.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no Gateway documents by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders Gateway fields from the fixture
    values:
      - tests/values/gateway.values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Gateway
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: edge-gateway
      - equal:
          path: metadata.namespace
          value: edge-ns
      - equal:
          path: metadata.labels.platform
          value: gateway-api
      - equal:
          path: metadata.labels.component
          value: gateway
      - equal:
          path: metadata.annotations.team
          value: edge
      - equal:
          path: metadata.annotations.note
          value: external
      - equal:
          path: spec.gatewayClassName
          value: public-gateway-class
      - equal:
          path: spec.addresses[0]
          value:
            type: IPAddress
            value: 192.0.2.10
      - equal:
          path: spec.addresses[1]
          value:
            type: Hostname
            value: edge.example.com
      - equal:
          path: spec.listeners[0].name
          value: https
      - equal:
          path: spec.listeners[0].hostname
          value: api.example.com
      - equal:
          path: spec.listeners[0].port
          value: 443
      - equal:
          path: spec.listeners[0].protocol
          value: HTTPS
      - equal:
          path: spec.listeners[0].tls
          value:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: edge-cert
            options:
              example.com/min-version: "1.3"
      - equal:
          path: spec.listeners[0].allowedRoutes
          value:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  expose: "true"
                matchExpressions:
                  - key: team
                    operator: In
                    values:
                      - core
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
              - group: gateway.networking.k8s.io
                kind: GRPCRoute
      - equal:
          path: spec.infrastructure
          value:
            labels:
              infra: public
            annotations:
              infra.example.com/class: internet
            parametersRef:
              group: example.net
              kind: GatewayInfra
              name: edge-config
      - equal:
          path: spec.allowedListeners
          value:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  shared-gateway: "true"
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - prod
