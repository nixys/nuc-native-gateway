suite: gatewayclass template
templates:
  - templates/gatewayclass.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no GatewayClass documents by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders GatewayClass fields from the fixture
    values:
      - tests/values/gatewayclass.values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: GatewayClass
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: public-gateway-class
      - equal:
          path: metadata.labels.platform
          value: gateway-api
      - equal:
          path: metadata.labels.component
          value: gateway-class
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nuc-native-gateway
      - equal:
          path: metadata.annotations.team
          value: edge
      - equal:
          path: metadata.annotations.note
          value: public
      - equal:
          path: spec.controllerName
          value: example.net/gateway-controller
      - equal:
          path: spec.description
          value: Public edge gateway class
      - equal:
          path: spec.parametersRef
          value:
            group: example.net
            kind: GatewayParameters
            name: public-gateway
            namespace: infra-system
      - equal:
          path: status.conditions[0]
          value:
            type: Accepted
            status: "True"
            observedGeneration: 2
            lastTransitionTime: "2026-03-13T10:05:00Z"
            reason: Accepted
            message: GatewayClass accepted
      - equal:
          path: status.supportedFeatures[0]
          value:
            name: Gateway
      - equal:
          path: status.supportedFeatures[1]
          value:
            name: HTTPRoute
      - equal:
          path: status.supportedFeatures[2]
          value:
            name: TLSRoute
