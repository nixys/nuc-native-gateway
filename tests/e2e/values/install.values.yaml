commonLabels:
  test-suite: e2e

commonAnnotations:
  test-suite: e2e

apiVersions:
  backendTLSPolicy: gateway.networking.k8s.io/v1
  gatewayClass: gateway.networking.k8s.io/v1
  gateway: gateway.networking.k8s.io/v1
  grpcRoute: gateway.networking.k8s.io/v1
  httpRoute: gateway.networking.k8s.io/v1
  referenceGrant: gateway.networking.k8s.io/v1beta1
  tlsRoute: gateway.networking.k8s.io/v1alpha2

backendTLSPolicies:
  - name: e2e-backend-tls
    spec:
      targetRefs:
        - group: ""
          kind: Service
          name: e2e-backend
          sectionName: https
      validation:
        hostname: backend.e2e.internal
        wellKnownCACertificates: System

gatewayClasses:
  - name: e2e-gateway-class
    spec:
      controllerName: example.net/gateway-controller

gateways:
  - name: e2e-gateway
    spec:
      gatewayClassName: e2e-gateway-class
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: Same
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
        - name: grpc
          port: 50051
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: e2e-gateway-cert
          allowedRoutes:
            namespaces:
              from: Same
            kinds:
              - group: gateway.networking.k8s.io
                kind: GRPCRoute
        - name: tls
          port: 443
          protocol: TLS
          tls:
            mode: Passthrough
          allowedRoutes:
            namespaces:
              from: Same
            kinds:
              - group: gateway.networking.k8s.io
                kind: TLSRoute

grpcRoutes:
  - name: e2e-grpc
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: e2e-gateway
          sectionName: grpc
          port: 50051
      hostnames:
        - grpc.e2e.example.com
      rules:
        - name: inventory
          matches:
            - method:
                type: Exact
                service: inventory.v1.InventoryService
                method: GetItem
          backendRefs:
            - group: ""
              kind: Service
              name: e2e-grpc-backend
              port: 9090

httpRoutes:
  - name: e2e-http
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: e2e-gateway
          sectionName: http
          port: 80
      hostnames:
        - api.e2e.example.com
      rules:
        - name: api
          matches:
            - path:
                type: PathPrefix
                value: /api
          backendRefs:
            - group: ""
              kind: Service
              name: e2e-backend
              port: 8080

referenceGrants:
  - name: e2e-referencegrant
    spec:
      from:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          namespace: nuc-native-gateway-e2e
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
          namespace: nuc-native-gateway-e2e
      to:
        - group: ""
          kind: Secret

tlsRoutes:
  - name: e2e-tls
    spec:
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: e2e-gateway
          sectionName: tls
          port: 443
      hostnames:
        - passthrough.e2e.example.com
      rules:
        - name: passthrough
          backendRefs:
            - group: ""
              kind: Service
              name: e2e-tls-backend
              port: 8443
