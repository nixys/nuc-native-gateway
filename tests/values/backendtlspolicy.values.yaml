commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

backendTLSPolicies:
  - name: backend-tls-with-ca
    namespace: app-a
    labels:
      component: backend-tls
    annotations:
      note: ca-bundle
    spec:
      targetRefs:
        - group: ""
          kind: Service
          name: payments
          sectionName: https
      validation:
        hostname: payments.internal.example.com
        caCertificateRefs:
          - group: ""
            kind: ConfigMap
            name: payments-ca
        subjectAltNames:
          - type: Hostname
            hostname: payments.internal.example.com
          - type: URI
            uri: spiffe://cluster.local/ns/app-a/sa/payments
      options:
        example.com/min-version: "1.3"
        example.com/cipher-suites: TLS_AES_128_GCM_SHA256
  - name: backend-tls-with-wellknown
    namespace: app-b
    labels:
      component: backend-tls
    annotations:
      note: system-ca
    spec:
      targetRefs:
        - group: ""
          kind: Service
          name: ledger
      validation:
        hostname: ledger.internal.example.com
        wellKnownCACertificates: System
      options:
        example.com/min-version: "1.2"
