commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

gateways:
  - name: edge-gateway
    namespace: edge-ns
    labels:
      component: gateway
    annotations:
      note: external
    spec:
      gatewayClassName: public-gateway-class
      addresses:
        - type: IPAddress
          value: 192.0.2.10
        - type: Hostname
          value: edge.example.com
      listeners:
        - name: https
          hostname: api.example.com
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: edge-cert
            options:
              example.com/min-version: "1.3"
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  expose: "true"
                matchExpressions:
                  - key: team
                    operator: In
                    values:
                      - core
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
              - group: gateway.networking.k8s.io
                kind: GRPCRoute
      infrastructure:
        labels:
          infra: public
        annotations:
          infra.example.com/class: internet
        parametersRef:
          group: example.net
          kind: GatewayInfra
          name: edge-config
      allowedListeners:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              shared-gateway: "true"
            matchExpressions:
              - key: env
                operator: In
                values:
                  - prod
