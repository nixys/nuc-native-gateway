commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

gateways:
  - name: edge-gateway
    namespace: edge-ns
    labels:
      component: gateway
    annotations:
      note: external
    spec:
      gatewayClassName: public-gateway-class
      addresses:
        - type: IPAddress
          value: 192.0.2.10
        - type: Hostname
          value: edge.example.com
      listeners:
        - name: https
          hostname: api.example.com
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: edge-cert
            options:
              example.com/min-version: "1.3"
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  expose: "true"
                matchExpressions:
                  - key: team
                    operator: In
                    values:
                      - core
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
              - group: gateway.networking.k8s.io
                kind: GRPCRoute
      infrastructure:
        labels:
          infra: public
        annotations:
          infra.example.com/class: internet
        parametersRef:
          group: example.net
          kind: GatewayInfra
          name: edge-config
      allowedListeners:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              shared-gateway: "true"
            matchExpressions:
              - key: env
                operator: In
                values:
                  - prod
    status:
      addresses:
        - type: IPAddress
          value: 198.51.100.10
        - type: Hostname
          value: lb.example.com
      conditions:
        - type: Accepted
          status: "True"
          observedGeneration: 1
          lastTransitionTime: "2026-03-13T10:10:00Z"
          reason: Accepted
          message: Gateway accepted
        - type: Programmed
          status: "True"
          observedGeneration: 1
          lastTransitionTime: "2026-03-13T10:10:00Z"
          reason: Programmed
          message: Gateway programmed
      listeners:
        - name: https
          supportedKinds:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
            - group: gateway.networking.k8s.io
              kind: GRPCRoute
          attachedRoutes: 4
          conditions:
            - type: Programmed
              status: "True"
              observedGeneration: 1
              lastTransitionTime: "2026-03-13T10:10:00Z"
              reason: Programmed
              message: Listener programmed
            - type: ResolvedRefs
              status: "True"
              observedGeneration: 1
              lastTransitionTime: "2026-03-13T10:10:00Z"
              reason: ResolvedRefs
              message: Listener references resolved
