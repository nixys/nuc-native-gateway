commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

listenerSets:
  - name: shared-listeners
    namespace: apps
    labels:
      component: listener-set
    annotations:
      note: shared
    spec:
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: edge-gateway
        namespace: edge-ns
      listeners:
        - name: shared-https
          hostname: shared.example.com
          port: 8443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: shared-cert
            options:
              example.com/min-version: "1.3"
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  tenant: shared
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - prod
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
