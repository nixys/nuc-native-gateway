commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

listenerSets:
  - name: shared-listeners
    namespace: apps
    labels:
      component: listener-set
    annotations:
      note: shared
    spec:
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: edge-gateway
        namespace: edge-ns
      listeners:
        - name: shared-https
          hostname: shared.example.com
          port: 8443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - group: ""
                kind: Secret
                name: shared-cert
            options:
              example.com/min-version: "1.3"
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  tenant: shared
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - prod
            kinds:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
    status:
      conditions:
        - type: Accepted
          status: "True"
          observedGeneration: 1
          lastTransitionTime: "2026-03-13T10:25:00Z"
          reason: Accepted
          message: ListenerSet accepted
        - type: Programmed
          status: "True"
          observedGeneration: 1
          lastTransitionTime: "2026-03-13T10:25:00Z"
          reason: Programmed
          message: ListenerSet programmed
      listeners:
        - name: shared-https
          supportedKinds:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
          attachedRoutes: 2
          conditions:
            - type: Accepted
              status: "True"
              observedGeneration: 1
              lastTransitionTime: "2026-03-13T10:25:00Z"
              reason: Accepted
              message: Listener accepted
            - type: Programmed
              status: "True"
              observedGeneration: 1
              lastTransitionTime: "2026-03-13T10:25:00Z"
              reason: Programmed
              message: Listener programmed
