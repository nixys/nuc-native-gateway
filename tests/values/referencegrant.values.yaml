commonLabels:
  platform: gateway-api
commonAnnotations:
  team: edge

referenceGrants:
  - name: allow-backend-refs
    namespace: backend
    labels:
      component: reference-grant
    annotations:
      note: cross-namespace
    spec:
      from:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          namespace: apps
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
          namespace: apps
      to:
        - group: ""
          kind: Service
          name: api-svc
        - group: ""
          kind: Secret
