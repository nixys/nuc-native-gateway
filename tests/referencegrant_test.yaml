suite: referencegrant template
templates:
  - templates/referencegrant.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no ReferenceGrant documents by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ReferenceGrant fields from the fixture
    values:
      - tests/values/referencegrant.values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ReferenceGrant
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: allow-backend-refs
      - equal:
          path: metadata.namespace
          value: backend
      - equal:
          path: metadata.labels.platform
          value: gateway-api
      - equal:
          path: metadata.labels.component
          value: reference-grant
      - equal:
          path: metadata.annotations.note
          value: cross-namespace
      - equal:
          path: spec.from[0]
          value:
            group: gateway.networking.k8s.io
            kind: HTTPRoute
            namespace: apps
      - equal:
          path: spec.from[1]
          value:
            group: gateway.networking.k8s.io
            kind: GRPCRoute
            namespace: apps
      - equal:
          path: spec.to[0]
          value:
            group: ""
            kind: Service
            name: api-svc
      - equal:
          path: spec.to[1]
          value:
            group: ""
            kind: Secret
