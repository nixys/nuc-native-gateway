suite: tlsroute template
templates:
  - templates/tlsroute.yaml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no TLSRoute documents by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders TLSRoute fields from the fixture
    values:
      - tests/values/tlsroute.values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: TLSRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: passthrough-tls
      - equal:
          path: metadata.namespace
          value: apps
      - equal:
          path: metadata.labels.platform
          value: gateway-api
      - equal:
          path: metadata.labels.component
          value: tls-route
      - equal:
          path: metadata.annotations.note
          value: passthrough
      - equal:
          path: spec.parentRefs[0]
          value:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: edge-gateway
            namespace: edge-ns
            sectionName: tls
            port: 443
      - equal:
          path: spec.hostnames[0]
          value: foo.example.com
      - equal:
          path: spec.hostnames[1]
          value: bar.example.com
      - equal:
          path: spec.rules[0].name
          value: tls-backends
      - equal:
          path: spec.rules[0].backendRefs[0]
          value:
            group: ""
            kind: Service
            name: foo-svc
            namespace: backend
            port: 443
            weight: 80
      - equal:
          path: spec.rules[0].backendRefs[1]
          value:
            group: ""
            kind: Service
            name: bar-svc
            port: 8443
            weight: 20
      - equal:
          path: spec.useDefaultGateways
          value: All
