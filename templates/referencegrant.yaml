{{- range $index, $item := .Values.referenceGrants }}
---
{{ include "nuc-native-gateway.renderResource" (dict
  "root" $
  "item" $item
  "kind" "ReferenceGrant"
  "defaultApiVersion" $.Values.apiVersions.referenceGrant
  "resourceKey" (printf "referenceGrants[%d]" $index)
  "namespaced" true
) }}
{{- end }}
