{{- range $index, $item := .Values.backendTLSPolicies }}
---
{{ include "nuc-native-gateway.renderResource" (dict
  "root" $
  "item" $item
  "kind" "BackendTLSPolicy"
  "defaultApiVersion" $.Values.apiVersions.backendTLSPolicy
  "resourceKey" (printf "backendTLSPolicies[%d]" $index)
  "namespaced" true
) }}
{{- end }}
