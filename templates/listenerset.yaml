{{- range $index, $item := .Values.listenerSets }}
---
{{ include "nuc-native-gateway.renderResource" (dict
  "root" $
  "item" $item
  "kind" "ListenerSet"
  "defaultApiVersion" $.Values.apiVersions.listenerSet
  "resourceKey" (printf "listenerSets[%d]" $index)
  "namespaced" true
) }}
{{- end }}
