{{- range $index, $item := .Values.gatewayClasses }}
---
{{ include "nuc-native-gateway.renderResource" (dict
  "root" $
  "item" $item
  "kind" "GatewayClass"
  "defaultApiVersion" $.Values.apiVersions.gatewayClass
  "resourceKey" (printf "gatewayClasses[%d]" $index)
  "namespaced" false
) }}
{{- end }}
