stages:
  - lint
  - unit-tests
  - compatibility_tests
  - render
  - validate

variables:
  CHART_DIR: "."
  RELEASE_NAME: "nuc-release"
  RELEASE_NAMESPACE: "default"
  KUBE_VERSION: "1.30.0"
  RENDER_DIR: ".rendered"
  POLICY_DIR: "policy"
  CONFTEST_REGO_VERSION: "v1"
  GOBIN: "$CI_PROJECT_DIR/.bin"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  HELM_CACHE_HOME: "$CI_PROJECT_DIR/.helm/cache"

default:
  image:
    name: alpine/helm:4
    entrypoint: ["/bin/sh", "-c"]

lint:
  stage: lint
  script:
    - helm dependency update
    - helm lint .

unit_tests:
  stage: unit-tests
  script:
    - helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false
    - helm unittest .

compatibility_tests:
  stage: compatibility_tests
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - git fetch --tags --force
  script:
    - sh tests/backward_compatibility_test.sh

render_manifests:
  stage: render
  script:
    - echo "🔧 CHART_DIR=$CHART_DIR"
    - echo "🔧 RENDER_DIR=$RENDER_DIR"
    - echo "🔧 RELEASE_NAME=$RELEASE_NAME"
    - echo "🔧 RELEASE_NAMESPACE=$RELEASE_NAMESPACE"
    - |
      if [ ! -f "$CHART_DIR/Chart.yaml" ]; then
        echo "❌ ОШИБКА: $CHART_DIR/Chart.yaml не найден"
        echo "📂 Содержимое текущей директории:"
        ls -la
        exit 1
      fi
    - helm dependency build "$CHART_DIR"
    - mkdir -p "$RENDER_DIR"
    - >
      helm template
      "$RELEASE_NAME"
      "$CHART_DIR"
      --namespace "$RELEASE_NAMESPACE"
      > "$RENDER_DIR/all.yaml"
    - test -s "$RENDER_DIR/all.yaml"
    - echo "✅ Сгенерировано $(grep -c '^kind:' .rendered/all.yaml) ресурсов"
    - echo "🔍 Полное содержимое $RENDER_DIR/all.yaml:"
    - cat "$RENDER_DIR/all.yaml"
    
    # === ПОИСК kind: С УЧЁТОМ ОТСТУПОВ ===
    - echo "🔎 Поиск 'kind:' с любыми отступами:"
    - grep -c 'kind:' "$RENDER_DIR/all.yaml" || echo "Не найдено"
    - grep 'kind:' "$RENDER_DIR/all.yaml" | head -10
    
    # === ПОИСК apiVersion ===
    - echo "🔎 Поиск 'apiVersion:':"
    - grep -c 'apiVersion:' "$RENDER_DIR/all.yaml" || echo "Не найдено"
    
    # === ПРОВЕРКА НА ПУСТЫЕ ДОКУМЕНТЫ ===
    - echo "🔎 Проверка на пустые YAML-документы:"
    - grep -E '^---$|^[[:space:]]*$' "$RENDER_DIR/all.yaml" | head -10
  artifacts:
    when: always
    paths:
      - .rendered/

kubeconform_validate:
  image:
    name: ghcr.io/yannh/kubeconform:latest-alpine
    entrypoint: [""]
  stage: validate
  needs:
    - job: render_manifests
      artifacts: true
  script:
    - cat $RENDER_DIR/all.yaml
    - >
      /kubeconform
      -summary
      -strict
      -output json
      -kubernetes-version "$KUBE_VERSION"
      "$RENDER_DIR/all.yaml"