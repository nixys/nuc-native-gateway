stages:
  - lint
  - unit-tests
  - compatibility_tests
  - render
  - validate

variables:
  CHART_DIR: "."
  RELEASE_NAME: "nuc-release"
  RELEASE_NAMESPACE: "default"
  KUBE_VERSION: "1.30.0"
  RENDER_DIR: ".rendered"
  POLICY_DIR: "policy"
  CONFTEST_REGO_VERSION: "v1"
  GOBIN: "$CI_PROJECT_DIR/.bin"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  HELM_CACHE_HOME: "$CI_PROJECT_DIR/.helm/cache"

default:
  image:
    name: alpine/helm:4
    entrypoint: ["/bin/sh", "-c"]

lint:
  stage: lint
  script:
    - helm dependency update
    - helm lint .

unit_tests:
  stage: unit-tests
  script:
    - helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false
    - helm unittest .

compatibility_tests:
  stage: compatibility_tests
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - git fetch --tags --force
  script:
    - sh tests/backward_compatibility_test.sh

render_manifests:
  stage: render
  image: alpine/helm:3.14.0
  variables:
    CHART_DIR: "${CHART_DIR:-.}"
    RENDER_DIR: "${RENDER_DIR:-.rendered}"
    RELEASE_NAME: "${RELEASE_NAME:-nuc-release}"
    RELEASE_NAMESPACE: "${RELEASE_NAMESPACE:-default}"
    
  script:
    # === 1. ОТЛАДКА ПЕРЕМЕННЫХ ===
    - echo "🔧 CHART_DIR=$CHART_DIR"
    - echo "🔧 RENDER_DIR=$RENDER_DIR"
    - echo "🔧 RELEASE_NAME=$RELEASE_NAME"
    - echo "🔧 RELEASE_NAMESPACE=$RELEASE_NAMESPACE"
    
    # === 2. ПРОВЕРКА CHART ===
    - |
      if [ ! -f "$CHART_DIR/Chart.yaml" ]; then
        echo "❌ ОШИБКА: Chart.yaml не найден"
        ls -la
        exit 1
      fi
    - echo "✅ Chart.yaml найден"
    - cat "$CHART_DIR/Chart.yaml"
    
    # === 3. ПРОВЕРКА TEMPLATE DIRECTORY ===
    - echo "📂 templates/ директория:"
    - ls -la "$CHART_DIR/templates/" 2>/dev/null || { echo "❌ templates/ не существует"; exit 1; }
    - echo "📄 Файлы в templates/:"
    - find "$CHART_DIR/templates/" -type f -name "*.yaml" -o -name "*.tpl" 2>/dev/null
    
    # === 4. HELM DEPENDENCY ===
    - echo "📦 helm dependency build..."
    - helm dependency build "$CHART_DIR" 2>&1
    - ls -la "$CHART_DIR/charts/" 2>/dev/null || echo "⚠️ charts/ пуст или не существует"
    
    # === 5. HELM TEMPLATE С ВЫВОДОМ В КОНСОЛЬ ===
    - echo "🔄 Запуск helm template (вывод в консоль для отладки):"
    - helm template "$RELEASE_NAME" "$CHART_DIR" --namespace "$RELEASE_NAMESPACE" 2>&1 | tee /tmp/helm_output.txt
    
    # === 6. ЗАПИСЬ В ФАЙЛ ===
    - mkdir -p "$RENDER_DIR"
    - helm template "$RELEASE_NAME" "$CHART_DIR" --namespace "$RELEASE_NAMESPACE" > "$RENDER_DIR/all.yaml" 2>&1
    
    # === 7. АНАЛИЗ ФАЙЛА ===
    - echo "📊 Анализ $RENDER_DIR/all.yaml:"
    - ls -la "$RENDER_DIR/all.yaml"
    - FILE_SIZE=$(stat -c%s "$RENDER_DIR/all.yaml" 2>/dev/null || stat -f%z "$RENDER_DIR/all.yaml")

    
    # === 8. ПОКАЗАТЬ СОДЕРЖИМОЕ ===
    - echo "🔍 Содержимое файла (первые 100 строк):"
    - head -100 "$RENDER_DIR/all.yaml"
    
    # === 9. ПОИСК РЕСУРСОВ ===
    - RESOURCE_COUNT=$(grep -cE '^[[:space:]]*kind:' "$RENDER_DIR/all.yaml" 2>/dev/null || echo 0)
    
    # === 10. ЗАВЕРШИТЬ С ОШИБКОЙ ЕСЛИ ПУСТО ===
    - |
      if [ "$RESOURCE_COUNT" -eq 0 ]; then
        echo "❌ ОШИБКА: Helm chart не сгенерировал ни одного ресурса"
        echo "🔍 Возможные причины:"
        echo "   1. Все шаблоны скрыты условиями {{ if .Values.xxx }}"
        echo "   2. Отсутствуют обязательные values"
        echo "   3. templates/ пуст или содержит только NOTES.txt"
        echo "🔍 Проверьте conditions в шаблонах:"
        grep -r "{{- if\|{{ if" "$CHART_DIR/templates/" 2>/dev/null | head -10
        exit 1
      fi
    
  artifacts:
    when: on_success  # Сохранять только при успехе
    paths:
      - "$RENDER_DIR/"
    expire_in: 1 hour

kubeconform_validate:
  image:
    name: ghcr.io/yannh/kubeconform:latest-alpine
    entrypoint: [""]
  stage: validate
  needs:
    - job: render_manifests
      artifacts: true
  script:
    - cat $RENDER_DIR/all.yaml
    - >
      /kubeconform
      -summary
      -strict
      -output json
      -kubernetes-version "$KUBE_VERSION"
      "$RENDER_DIR/all.yaml"