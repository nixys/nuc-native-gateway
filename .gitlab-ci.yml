stages:
  - lint
  - unit-tests
  - compatibility_tests
  - render
  - validate

variables:
  CHART_DIR: "."
  RELEASE_NAME: "nuc-release"
  RELEASE_NAMESPACE: "default"
  KUBE_VERSION: "1.30.0"
  RENDER_DIR: ".rendered"
  KUBECONFORM_CRD_SCHEMA_LOCATION: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
  KUBECONFORM_SKIP_KINDS: "ListenerSet,ReferenceGrant,TLSRoute"
  GOBIN: "$CI_PROJECT_DIR/.bin"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
  HELM_CACHE_HOME: "$CI_PROJECT_DIR/.helm/cache"
  HELM_EXAMPLE_VALUES: "values.yaml.example"

default:
  image:
    name: alpine/helm:4
    entrypoint: ["/bin/sh", "-c"]

lint:
  stage: lint
  script:
    - helm dependency update
    - helm lint .

unit_tests:
  stage: unit-tests
  script:
    - helm plugin install https://github.com/helm-unittest/helm-unittest.git
    - helm unittest -f 'tests/units/*_test.yaml' .

compatibility_tests:
  stage: compatibility_tests
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache git
    - git fetch --tags --force
  script:
    - sh tests/units/backward_compatibility_test.sh

render_manifests:
  stage: render
  script:
    - helm dependency build "$CHART_DIR"
    - mkdir -p "$RENDER_DIR"
    - >
      helm template
      "$RELEASE_NAME"
      "$CHART_DIR"
      --namespace "$RELEASE_NAMESPACE"
      -f "$HELM_EXAMPLE_VALUES"
      > "$RENDER_DIR/all.yaml"
    - test -s "$RENDER_DIR/all.yaml"
  artifacts:
    when: always
    paths:
      - .rendered/

kubeconform_validate:
  image:
    name: ghcr.io/yannh/kubeconform:latest-alpine
    entrypoint: [""]
  stage: validate
  needs:
    - job: render_manifests
      artifacts: true
  script:
    # Gateway API resources are CRDs, so kubeconform needs an extra schema registry.
    # Some Gateway API kinds used by this chart do not currently have schemas in the selected catalog.
    - >
      /kubeconform
      -summary
      -strict
      -output json
      -kubernetes-version "$KUBE_VERSION"
      -schema-location default
      -schema-location "$KUBECONFORM_CRD_SCHEMA_LOCATION"
      -skip "$KUBECONFORM_SKIP_KINDS"
      "$RENDER_DIR/all.yaml"
